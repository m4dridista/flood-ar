<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flood Height AR</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #ui {
      position: absolute; bottom: 30px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      z-index: 10;
    }
    #label {
      background: rgba(0,0,255,0.7); color: white;
      padding: 8px 20px; border-radius: 20px;
      font-size: 18px; font-weight: bold;
    }
    #btn {
      background: white; border: none;
      padding: 12px 28px; border-radius: 24px;
      font-size: 16px; font-weight: bold;
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #hint {
      color: white; font-size: 13px;
      background: rgba(0,0,0,0.45);
      padding: 6px 14px; border-radius: 12px;
    }
  </style>
</head>
<body>
<div id="ui">
  <div id="label">Point camera at the floor</div>
  <div id="hint">Walk around — the water level stays fixed in space</div>
  <button id="btn" onclick="nextLevel()">Raise flood level</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<script>
const levels = [
  { label: "Ankle — 0.15 m", y: 0.15, color: 0x534AB7 },
  { label: "Knee — 0.30 m",  y: 0.30, color: 0x378ADD },
  { label: "Waist — 0.60 m", y: 0.60, color: 0x1D9E75 },
  { label: "Chest — 1.0 m",  y: 1.00, color: 0xBA7517 },
  { label: "Head — 1.5 m",   y: 1.50, color: 0xD85A30 },
  { label: "Catastrophic — 3.0 m", y: 3.00, color: 0xE24B4A },
];
let current = -1;
let waterMesh;

async function init() {
  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.body.appendChild(renderer.domElement);

  if (navigator.xr) {
    const session = await navigator.xr.requestSession('immersive-ar', {
      requiredFeatures: ['hit-test']
    });
    renderer.xr.setSession(session);
  }

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

  const geo = new THREE.PlaneGeometry(20, 20);
  const mat = new THREE.MeshBasicMaterial({
    color: 0x378ADD, transparent: true, opacity: 0.45, side: THREE.DoubleSide
  });
  waterMesh = new THREE.Mesh(geo, mat);
  waterMesh.rotation.x = -Math.PI / 2;
  waterMesh.position.y = 0;
  waterMesh.visible = false;
  scene.add(waterMesh);

  renderer.setAnimationLoop(() => renderer.render(scene, camera));
}

function nextLevel() {
  current = (current + 1) % levels.length;
  const lvl = levels[current];
  document.getElementById('label').textContent = lvl.label;
  document.getElementById('hint').textContent =
    current === 0 ? "This is where many Singapore flash floods peak"
    : current === 2 ? "Singapore road closure threshold"
    : current === 4 ? "Regional major flood level (Jakarta 2020)"
    : current === 5 ? "Typhoon storm surge level"
    : "Walking becomes very difficult at this depth";
  if (waterMesh) {
    waterMesh.visible = true;
    waterMesh.position.y = lvl.y;
    waterMesh.material.color.setHex(lvl.color);
  }
}

init().catch(() => {
  document.getElementById('hint').textContent =
    "AR not supported on this device — try Chrome on Android";
});
</script>
</body>
</html>
