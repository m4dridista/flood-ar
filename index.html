<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>Flood Height AR — Singapore</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: sans-serif; }
    #ui {
      position: absolute;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column;
      align-items: center; gap: 10px;
      z-index: 999; width: 90%;
    }
    #label {
      background: rgba(26,95,168,0.88);
      color: white; padding: 10px 24px;
      border-radius: 24px; font-size: 19px;
      font-weight: 700; text-align: center;
      transition: background 0.5s;
    }
    #hint {
      color: white; font-size: 13px;
      background: rgba(0,0,0,0.5);
      padding: 6px 16px; border-radius: 12px;
      text-align: center; max-width: 300px;
    }
    #btn {
      background: white; border: none;
      padding: 14px 36px; border-radius: 28px;
      font-size: 17px; font-weight: 700;
      cursor: pointer; color: #0a1628;
    }
    #btn:active { transform: scale(0.97); }
    #reset-btn {
      font-size: 13px; color: rgba(255,255,255,0.6);
      background: none; border: none; cursor: pointer;
    }
    #dots { display: flex; gap: 6px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transition: background 0.4s;
    }
    .dot.active { background: white; }
    #scanning-msg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: white; font-size: 15px;
      background: rgba(0,0,0,0.6);
      padding: 12px 24px; border-radius: 16px;
      text-align: center; z-index: 998;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="scanning-msg">Point camera at the<br>Singapore map card</div>

<div id="ui">
  <div id="dots">
    <div class="dot" id="dot-0"></div>
    <div class="dot" id="dot-1"></div>
    <div class="dot" id="dot-2"></div>
    <div class="dot" id="dot-3"></div>
    <div class="dot" id="dot-4"></div>
    <div class="dot" id="dot-5"></div>
  </div>
  <div id="label">Scan the map to begin</div>
  <div id="hint">Hold your phone over the Singapore map card</div>
  <button id="btn" onclick="nextLevel()">Raise flood level</button>
  <button id="reset-btn" onclick="resetLevels()">Start over</button>
</div>

<a-scene
  mindar-image="imageTargetSrc: ./singapore.mind; uiLoading: no; uiError: no; uiScanning: no;"
  color-space="sRGB"
  renderer="colorManagement: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
  style="width:100vw;height:100vh;position:absolute;top:0;left:0;">

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity mindar-image-target="targetIndex: 0">
    <a-plane
      id="water"
      color="#1a5fa8"
      opacity="0.55"
      width="1" height="1"
      position="0 0 0"
      rotation="-90 0 0"
      visible="false">
    </a-plane>

    <a-plane
      color="#3a8fd4"
      opacity="0.35"
      width="1.05" height="0.02"
      position="0 0.002 0"
      rotation="-90 0 0"
      id="surface"
      visible="false">
    </a-plane>
  </a-entity>

</a-scene>

<script>
const levels = [
  { label: "Ankle — 0.15 m", hint: "Where many Singapore flash floods peak", color: "#534AB7", h: 0.15 },
  { label: "Knee — 0.30 m",  hint: "Most cars stall. Walking becomes dangerous.", color: "#185FA5", h: 0.30 },
  { label: "Waist — 0.60 m", hint: "Singapore road closure threshold", color: "#0F6E56", h: 0.60 },
  { label: "Chest — 1.0 m",  hint: "Bukit Timah Rd flash flood peak (2021)", color: "#854F0B", h: 1.00 },
  { label: "Head — 1.5 m",   hint: "Regional major floods: Jakarta 2020, KL 2021", color: "#993C1D", h: 1.50 },
  { label: "Catastrophic — 3.0 m", hint: "Typhoon Haiyan storm surge (2013)", color: "#A32D2D", h: 3.00 },
];

let current = -1;

const sceneEl = document.querySelector('a-scene');
sceneEl.addEventListener('arReady', () => {
  document.getElementById('scanning-msg').style.display = 'none';
});

sceneEl.addEventListener('targetFound', () => {
  document.getElementById('water').setAttribute('visible', true);
  document.getElementById('surface').setAttribute('visible', true);
  document.getElementById('scanning-msg').style.display = 'none';
});

sceneEl.addEventListener('targetLost', () => {
  document.getElementById('scanning-msg').style.display = 'block';
  document.getElementById('scanning-msg').textContent =
    'Map lost — point camera\nback at the Singapore map';
});

function nextLevel() {
  current = Math.min(current + 1, levels.length - 1);
  const lvl = levels[current];

  document.getElementById('label').textContent = lvl.label;
  document.getElementById('label').style.background = lvl.color + 'cc';
  document.getElementById('hint').textContent = lvl.hint;

  const water = document.getElementById('water');
  water.setAttribute('color', lvl.color);
  water.setAttribute('height', lvl.h);
  water.setAttribute('position', '0 ' + (lvl.h / 2) + ' 0');

  const surface = document.getElementById('surface');
  surface.setAttribute('color', lvl.color);
  surface.setAttribute('position', '0 ' + lvl.h + ' 0.001');

  for (let i = 0; i < levels.length; i++) {
    document.getElementById('dot-' + i).classList.toggle('active', i === current);
  }

  if (current === levels.length - 1) {
    document.getElementById('btn').textContent = "Peak reached";
    document.getElementById('btn').disabled = true;
    document.getElementById('btn').style.opacity = '0.5';
  }
}

function resetLevels() {
  current = -1;
  document.getElementById('water').setAttribute('visible', false);
  document.getElementById('surface').setAttribute('visible', false);
  document.getElementById('label').textContent = 'Scan the map to begin';
  document.getElementById('label').style.background = 'rgba(26,95,168,0.88)';
  document.getElementById('hint').textContent = 'Hold your phone over the Singapore map card';
  document.getElementById('btn').textContent = 'Raise flood level';
  document.getElementById('btn').disabled = false;
  document.getElementById('btn').style.opacity = '1';
  for (let i = 0; i < levels.length; i++) {
    document.getElementById('dot-' + i).classList.remove('active');
  }
}
</script>
</body>
</html>
