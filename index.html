<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flood Height AR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      #ui {
        position: absolute;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        z-index: 999;
        width: 90%;
      }
      #label {
        background: rgba(30, 100, 220, 0.82);
        color: white;
        padding: 10px 24px;
        border-radius: 24px;
        font-size: 18px;
        font-weight: bold;
        font-family: sans-serif;
        text-align: center;
      }
      #hint {
        color: white;
        font-size: 13px;
        font-family: sans-serif;
        background: rgba(0,0,0,0.5);
        padding: 6px 16px;
        border-radius: 12px;
        text-align: center;
      }
      #btn {
        background: white;
        border: none;
        padding: 14px 32px;
        border-radius: 28px;
        font-size: 17px;
        font-weight: bold;
        font-family: sans-serif;
        cursor: pointer;
      }
    </style>
  </head>
  <body style="margin:0; overflow:hidden;">

    <div id="ui">
      <div id="label">Point your camera at the floor</div>
      <div id="hint">Tap the button to raise the flood level</div>
      <button id="btn" onclick="nextLevel()">Raise flood level</button>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      embedded
      style="width:100vw; height:100vh; position:absolute; top:0; left:0;">

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane
          id="water"
          color="#1a6fc4"
          opacity="0.55"
          width="2"
          height="0.01"
          position="0 0.15 0"
          rotation="-90 0 0">
        </a-plane>
      </a-entity>

    </a-scene>

    <script>
      const levels = [
        { label: "Ankle — 0.15 m", y: 0.15, hint: "Where many Singapore flash floods peak", color: "#534AB7" },
        { label: "Knee — 0.30 m",  y: 0.30, hint: "Most cars stall. Walking becomes very difficult.", color: "#378ADD" },
        { label: "Waist — 0.60 m", y: 0.60, hint: "Singapore road closure threshold", color: "#1D9E75" },
        { label: "Chest — 1.0 m",  y: 1.00, hint: "Bukit Timah Road flash flood peak (2021)", color: "#BA7517" },
        { label: "Head — 1.5 m",   y: 1.50, hint: "Regional major floods: Jakarta 2020, KL 2021", color: "#D85A30" },
        { label: "Catastrophic — 3.0 m", y: 3.00, hint: "Typhoon Haiyan storm surge level (2013)", color: "#E24B4A" },
      ];

      let current = -1;

      function nextLevel() {
        current = (current + 1) % levels.length;
        const lvl = levels[current];

        document.getElementById('label').textContent = lvl.label;
        document.getElementById('label').style.background =
          lvl.color + 'cc';
        document.getElementById('hint').textContent = lvl.hint;

        const water = document.getElementById('water');
        if (water) {
          water.setAttribute('position', '0 ' + lvl.y + ' 0');
          water.setAttribute('color', lvl.color);
        }
      }
    </script>

  </body>
</html>
