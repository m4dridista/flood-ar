<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>Flood Height</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a1628;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      position: relative;
    }

    #scene {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    #sky {
      flex: 1;
      background: #0a1628;
      position: relative;
      overflow: hidden;
    }

    #building {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #floor-label {
      position: absolute;
      right: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      white-space: nowrap;
    }

    #water-container {
      width: 100%;
      position: relative;
      overflow: hidden;
      transition: height 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      height: 0px;
    }

    #water-body {
      position: absolute;
      inset: 0;
      background: #1a5fa8;
    }

    #water-surface {
      position: absolute;
      top: 0;
      left: -20%;
      width: 140%;
      height: 18px;
      background: #3a8fd4;
      border-radius: 50%;
      transition: transform 0.4s ease-out;
    }

    #ground {
      width: 100%;
      height: 6px;
      background: #2a3a2a;
    }

    #person {
      position: absolute;
      bottom: 6px;
      left: calc(50% - 110px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    #person-label {
      font-size: 10px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 2px;
    }

    .person-svg { opacity: 0.5; }

    #depth-line {
      position: absolute;
      left: 0; right: 0;
      height: 1px;
      background: rgba(255,255,255,0.25);
      transition: bottom 1.2s cubic-bezier(0.4, 0, 0.2, 1);
      bottom: 6px;
      pointer-events: none;
    }

    #ui {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 16px 20px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    #label {
      font-size: 20px;
      font-weight: 700;
      color: white;
      text-align: center;
      padding: 8px 22px;
      border-radius: 24px;
      background: rgba(26, 95, 168, 0.85);
      transition: background 0.6s;
    }

    #hint {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      text-align: center;
      background: rgba(0,0,0,0.4);
      padding: 5px 14px;
      border-radius: 12px;
      max-width: 300px;
    }

    #btn {
      background: white;
      border: none;
      padding: 14px 36px;
      border-radius: 28px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      color: #0a1628;
      margin-top: 2px;
    }

    #btn:active { transform: scale(0.97); }

    #reset-btn {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 12px;
    }

    #progress-dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      transition: background 0.4s;
    }
    .dot.active { background: white; }
  </style>
</head>
<body>

<div id="scene">
  <div id="sky">
    <div id="person">
      <div id="person-label">avg. person</div>
      <svg class="person-svg" width="28" height="80" viewBox="0 0 28 80">
        <circle cx="14" cy="8" r="7" fill="white"/>
        <rect x="8" y="16" width="12" height="30" rx="4" fill="white"/>
        <rect x="2" y="20" width="8" height="22" rx="4" fill="white"/>
        <rect x="18" y="20" width="8" height="22" rx="4" fill="white"/>
        <rect x="8" y="44" width="6" height="28" rx="3" fill="white"/>
        <rect x="14" y="44" width="6" height="28" rx="3" fill="white"/>
      </svg>
    </div>
    <div id="depth-line"></div>
  </div>

  <div id="water-container">
    <div id="water-body"></div>
    <div id="water-surface"></div>
  </div>
  <div id="ground"></div>
</div>

<div id="ui">
  <div id="progress-dots">
    <div class="dot" id="dot-0"></div>
    <div class="dot" id="dot-1"></div>
    <div class="dot" id="dot-2"></div>
    <div class="dot" id="dot-3"></div>
    <div class="dot" id="dot-4"></div>
    <div class="dot" id="dot-5"></div>
  </div>
  <div id="label">Point camera at the floor</div>
  <div id="hint">Tap below to see how high floodwater can rise</div>
  <button id="btn" onclick="nextLevel()">Raise flood level</button>
  <button id="reset-btn" onclick="reset()">Start over</button>
</div>

<script>
const levels = [
  { label: "Ankle — 0.15 m", hint: "Where many Singapore flash floods peak. Most people still walking.", color: "#534AB7", frac: 0.08 },
  { label: "Knee — 0.30 m",  hint: "Most cars stall. Walking becomes very difficult and dangerous.", color: "#185FA5", frac: 0.18 },
  { label: "Waist — 0.60 m", hint: "Singapore road closure threshold. Strong current makes standing unsafe.", color: "#0F6E56", frac: 0.34 },
  { label: "Chest — 1.0 m",  hint: "Bukit Timah Rd flash flood peak (2021). Impossible to walk against current.", color: "#854F0B", frac: 0.52 },
  { label: "Head — 1.5 m",   hint: "Regional major floods: Jakarta 2020, Kuala Lumpur 2021. Fully submerged.", color: "#993C1D", frac: 0.70 },
  { label: "Catastrophic — 3.0 m", hint: "Typhoon Haiyan storm surge (2013). Above the ceiling of a typical room.", color: "#A32D2D", frac: 0.92 },
];

let current = -1;
let tilt = 0;

function nextLevel() {
  current = Math.min(current + 1, levels.length - 1);
  apply();
  if (current === levels.length - 1) {
    document.getElementById('btn').textContent = "That's the peak";
    document.getElementById('btn').disabled = true;
    document.getElementById('btn').style.opacity = '0.5';
  }
}

function reset() {
  current = -1;
  document.getElementById('water-container').style.height = '0px';
  document.getElementById('depth-line').style.bottom = '6px';
  document.getElementById('label').textContent = 'Point camera at the floor';
  document.getElementById('label').style.background = 'rgba(26,95,168,0.85)';
  document.getElementById('hint').textContent = 'Tap below to see how high floodwater can rise';
  document.getElementById('btn').textContent = 'Raise flood level';
  document.getElementById('btn').disabled = false;
  document.getElementById('btn').style.opacity = '1';
  document.getElementById('water-body').style.background = '#1a5fa8';
  document.getElementById('water-surface').style.background = '#3a8fd4';
  for (let i = 0; i < levels.length; i++) {
    document.getElementById('dot-' + i).classList.remove('active');
  }
}

function apply() {
  const lvl = levels[current];
  const vh = window.innerHeight;
  const waterPx = Math.round(lvl.frac * vh);

  document.getElementById('water-container').style.height = waterPx + 'px';
  document.getElementById('depth-line').style.bottom = (waterPx + 6) + 'px';
  document.getElementById('label').textContent = lvl.label;
  document.getElementById('label').style.background = lvl.color + 'cc';
  document.getElementById('hint').textContent = lvl.hint;
  document.getElementById('water-body').style.background = lvl.color;
  document.getElementById('water-surface').style.background = lvl.color;

  for (let i = 0; i < levels.length; i++) {
    document.getElementById('dot-' + i).classList.toggle('active', i === current);
  }
}

window.addEventListener('deviceorientation', function(e) {
  if (e.gamma === null) return;
  tilt = Math.max(-20, Math.min(20, e.gamma));
  document.getElementById('water-surface').style.transform =
    'rotate(' + (tilt * 0.4) + 'deg)';
});

if (typeof DeviceOrientationEvent !== 'undefined' &&
    typeof DeviceOrientationEvent.requestPermission === 'function') {
  document.getElementById('btn').addEventListener('click', function permClick() {
    DeviceOrientationEvent.requestPermission().then(function(state) {
      if (state === 'granted') {
        document.getElementById('btn').removeEventListener('click', permClick);
      }
    });
  }, { once: true });
}
</script>
</body>
</html>
